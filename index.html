<html lang="en">

  <style>

    html,body{min-height:100%;background:#f8fbff}

    .toolbar button{

    .page{

    .top-section{

    .section-add{

    .top-side-add{

    .connector-main{

    .chief-row-wrap{

    .chief-node,

    .chief-node:before,

    .chief-node:before{

    .department-col:before{

    .post-input:focus{

    .name-input{

    .box.main .post-input{

<script>

var data=[
 {chief:"Chief Technology Officer",name:"",teams:[
  {title:"AI / ML Team",roles:["NLP Engineer","ML Engineer","Data Scientist"]},
  {title:"Engineering Team",roles:["Backend Developer","Frontend Developer","DevOps Engineer"]},

 ]},
 {chief:"Chief Product Officer",name:"",teams:[

 ]},
 {chief:"Chief Business Officer",name:"",teams:[
  {title:"Business Team",roles:["Business Development Manager","Strategy Manager"]},
  {title:"Sales Team",roles:["Sales Manager","Account Manager"]},
  {title:"Partnership Team",roles:["Partnership Manager","Alliance Manager"]}
 ]},
 {chief:"Chief Marketing Officer",name:"",teams:[
  {title:"Marketing Team",roles:["Performance Marketer","Social Media Manager"]},
  {title:"Creator Ecosystem Team",roles:["Creator Manager","Creator Strategist"]},
  {title:"Content Team",roles:["Script Writer","Editor"]}
 ]},
 {chief:"Chief Operating Officer",name:"",teams:[
  {title:"Operations Team",roles:["Operations Manager","Process Analyst"]},
  {title:"Support Team",roles:["Customer Support","Creator Support"]},
  {title:"Moderation Team",roles:["Moderators","AI Moderation Ops"]}
 ]},
 {chief:"Chief Financial Officer",name:"",teams:[
  {title:"Finance Team",roles:["Accountant","Financial Analyst"]},
  {title:"Ads / Monetization Team",roles:["Ad Operations","Yield Manager"]}
 ]},
 {chief:"Chief Human Resources Officer",name:"",teams:[
  {title:"HR Team",roles:["Recruiter","HR Operations"]},
  {title:"AI Training Team",roles:["AI Trainers","Linguists"]}
 ]}
];

var undoStack=[];
var redoStack=[];
var isRestoring=false;
var activeEditInput=null;
var activeEditOldValue=null;
var activeEditOldFontSize=null;

function chartHTML(){
 return document.querySelector(".org-chart").innerHTML;
}

function pushUndo(action){
 if(isRestoring || !action)return;
 undoStack.push(action);
 if(undoStack.length>120)undoStack.shift();
 redoStack=[];
}

function saveState(){
 commitActiveEdit();
 pushUndo({type:"snapshot",html:chartHTML()});
}

function restoreState(html){
 isRestoring=true;
 document.querySelector(".org-chart").innerHTML=html;
 updateGridColumns();
 setupExistingInputs();
 activeEditInput=null;
 activeEditOldValue=null;
 activeEditOldFontSize=null;
 isRestoring=false;
}

function applyInputValue(input,value,fontSize){
 if(!input)return;
 input.value=value;
 if(fontSize){input.style.fontSize=fontSize;}
 autoFitInput(input);
}

function commitActiveEdit(){
 if(!activeEditInput)return;
 var newValue=activeEditInput.value;

 if(newValue!==activeEditOldValue){
  pushUndo({
   type:"input",
   input:activeEditInput,
   oldValue:activeEditOldValue,
   newValue:newValue,
   oldFontSize:activeEditOldFontSize,
   newFontSize:activeEditInput.style.fontSize
  });
 }

 activeEditInput=null;
 activeEditOldValue=null;
 activeEditOldFontSize=null;
}

function undoAction(){

 if(activeEditInput){

  var inputNow=activeEditInput;
  var oldValueNow=activeEditOldValue;
  var oldFontNow=activeEditOldFontSize;
  var newValueNow=inputNow.value;
  var newFontNow=inputNow.style.fontSize;

  if(newValueNow!==oldValueNow){

   redoStack.push({
    type:"input",
    input:inputNow,
    oldValue:oldValueNow,
    newValue:newValueNow,
    oldFontSize:oldFontNow,
    newFontSize:newFontNow
   });

   applyInputValue(inputNow,oldValueNow,oldFontNow);
  }

  activeEditInput=null;
  activeEditOldValue=null;
  activeEditOldFontSize=null;
  return;
 }

 if(undoStack.length===0)return;

 var action=undoStack.pop();

 if(action.type==="input"){
  redoStack.push(action);
  applyInputValue(action.input,action.oldValue,action.oldFontSize);
  return;
 }

 if(action.type==="snapshot"){
  redoStack.push({type:"snapshot",html:chartHTML()});
  restoreState(action.html);
 }

}

function redoAction(){

 commitActiveEdit();

 if(redoStack.length===0)return;

 var action=redoStack.pop();

 if(action.type==="input"){
  undoStack.push(action);
  applyInputValue(action.input,action.newValue,action.newFontSize);
  return;
 }

 if(action.type==="snapshot"){
  undoStack.push({type:"snapshot",html:chartHTML()});
  restoreState(action.html);
 }

}

function setupInput(input){

 input.addEventListener("focus",function(){
  activeEditInput=input;
  activeEditOldValue=input.value;
  activeEditOldFontSize=input.style.fontSize;
 });

 input.addEventListener("input",function(){
  autoFitInput(input);
 });

 input.addEventListener("blur",function(){
  commitActiveEdit();
 });

 autoFitInput(input);
}

function setupExistingInputs(){
 document.querySelectorAll("input").forEach(setupInput);
}

function autoFitInput(input){

 var text=(input.value || input.placeholder || "");
 var len=text.length;

 if(input.classList.contains("post-input")){

  if(len>28){input.style.fontSize="12px";}
  else if(len>22){input.style.fontSize="13px";}
  else if(len>17){input.style.fontSize="14px";}
  else{input.style.fontSize=input.closest(".box.main")?"20px":"15px";}
 }

 if(input.classList.contains("role-input") || input.classList.contains("role-name-input")){

  if(len>22){input.style.fontSize="10px";}
  else{input.style.fontSize="11px";}
 }
}

function makeInput(className,value,placeholder){

 var input=document.createElement("input");

 input.className=className;
 input.value=value||"";
 input.placeholder=placeholder||"";

 setupInput(input);

 return input;
}

function makeDeleteButton(functionName){

 var button=document.createElement("button");

 button.className=functionName==="deletePerson"?"small-delete":"delete-btn";
 button.textContent="×";
 button.setAttribute("onclick",functionName+"(this)");

 return button;
}

function makeTopMainBox(role,name){

 var box=document.createElement("div");

 box.className="box main";

 box.appendChild(makeDeleteButton("deleteBox"));
 box.appendChild(makeInput("post-input",role||"","Enter Role"));
 box.appendChild(makeInput("name-input",name||"","Enter name here"));

}

function makePersonCard(role){

 card.className="person-card";

 fields.className="person-fields";

 fields.appendChild(makeInput("role-input",role||"","Enter role"));
 fields.appendChild(makeInput("role-name-input","","Enter name"));

 card.appendChild(fields);

function makeTeamBox(title,roles){

function makeChiefNode(chief,name){

function makeDepartmentCol(teams,withDefaultTeam){

 var col=document.createElement("div");
 col.className="department-col";

 if(withDefaultTeam!==false){

  (teams||[{title:"",roles:[""]}]).forEach(function(team){
   col.appendChild(makeTeamBox(team.title,team.roles));

 var addBox=document.createElement("button");

 addBox.className="add-box";
 addBox.textContent="+";

function renderInitial(){

 data.forEach(function(item){

  grid.appendChild(makeDepartmentCol(item.teams,true));

 addColumnButton.className="add-column";

 var template="repeat("+chiefCount+", 220px) 54px";

function addColumn(){

 chiefRow.insertBefore(makeChiefNode("",""),addButton);

function addTeamBox(button){

 saveState();

 var col=button.closest(".department-col");

 col.insertBefore(makeTeamBox("",[""]),button);
}

function addPerson(button){

 button.parentElement.insertBefore(makePersonCard(""),button);
}

function deletePerson(button){

 saveState();

 var personCard=button.closest(".person-card");

 if(personCard){
  personCard.remove();
 }
}

function deleteBox(button){

 saveState();

 var box=button.closest(".box");
 var topWrap=box.closest(".top-row-wrap");

 if(box){
  box.remove();
 }

 if(topWrap){

  var boxes=topWrap.querySelectorAll(".box.main");
  var totalTopRows=document.querySelectorAll(".top-row-wrap").length;

  if(boxes.length===0 && totalTopRows>1){
   topWrap.remove();
  }
 }
}

function deleteColumn(button){

 commitActiveEdit();

 var node=button.closest(".chief-node");

 var nodes=Array.prototype.slice.call(document.querySelectorAll("#chiefRow .chief-node"));

 if(nodes.length<=1){
  alert("At least one column should remain.");
  return;
 }

 saveState();

 var index=nodes.indexOf(node);

 var cols=document.querySelectorAll("#departmentGrid .department-col");

 if(cols[index]){
  cols[index].remove();
 }

 node.remove();

 updateGridColumns();
}

function cleanExcelValue(value){

 var text=String(value||"").replace(/\r/g," ").replace(/\n/g," ").trim();

 if(!text || text==="Enter Role" || text==="Enter name here" || text==="Enter team/post" || text==="Enter team head name" || text==="Enter role" || text==="Enter name"){
  return "";
 }

 return text;
}

function addExcelPair(column,styles,role,name){

 role=cleanExcelValue(role);
 name=cleanExcelValue(name);

 if(role || name){
  column.push(role);
  styles.push(role?"role":"blank");
  column.push(name);
  styles.push(name?"name":"blank");
  column.push("");
  styles.push("blank");
 }
}

function setCellStyle(ws,address,type){

 if(!ws[address])return;

 var base={
  alignment:{horizontal:"center",vertical:"center",wrapText:true},
  border:{
   top:{style:"thin",color:{rgb:"D9E8FF"}},
   bottom:{style:"thin",color:{rgb:"D9E8FF"}},
   left:{style:"thin",color:{rgb:"D9E8FF"}},
   right:{style:"thin",color:{rgb:"D9E8FF"}}
  },
  fill:{fgColor:{rgb:"F7FBFF"}}
 };

 if(type==="role"){
  base.font={bold:true,color:{rgb:"0B2E70"},sz:11};
  base.fill={fgColor:{rgb:"EAF4FF"}};
 }
 else if(type==="name"){
  base.font={bold:false,color:{rgb:"1976ED"},sz:10};
  base.fill={fgColor:{rgb:"FFFFFF"}};
 }
 else{
  base.border={};
  base.fill={fgColor:{rgb:"FFFFFF"}};
 }

 ws[address].s=base;
}

function downloadExcel(){

 commitActiveEdit();

 if(typeof XLSX==="undefined"){
  alert("Excel library not loaded. Please check internet connection and try again.");
  return;
 }

 var aoa=[];
 var styleMap=[];

 function pushRow(values,types){
  aoa.push(values);
  styleMap.push(types || values.map(function(){return "blank";}));
 }

 pushRow(["Organizational Structure"],["title"]);
 pushRow([""],["blank"]);

 document.querySelectorAll(".top-row-wrap").forEach(function(wrap){

  var boxes=Array.prototype.slice.call(wrap.querySelectorAll(".top-row .box.main"));

  if(boxes.length===0)return;

  var roleRow=[];
  var nameRow=[];
  var blankRow=[];
  var roleTypes=[];
  var nameTypes=[];
  var blankTypes=[];

  boxes.forEach(function(box){
   roleRow.push(cleanExcelValue(box.querySelector(".post-input").value));
   nameRow.push(cleanExcelValue(box.querySelector(".name-input").value));
   blankRow.push("");
   roleTypes.push("role");
   nameTypes.push("name");
   blankTypes.push("blank");
  });

  pushRow(roleRow,roleTypes);
  pushRow(nameRow,nameTypes);
  pushRow(blankRow,blankTypes);

 });

 pushRow([""],["blank"]);

 var chiefNodes=Array.prototype.slice.call(document.querySelectorAll("#chiefRow .chief-node"));
 var deptCols=Array.prototype.slice.call(document.querySelectorAll("#departmentGrid .department-col"));
 var exportColumns=[];
 var exportStyles=[];

 chiefNodes.forEach(function(node,index){

  var col=[];
  var styles=[];

  addExcelPair(
   col,
   styles,
   node.querySelector(".post-input").value,
   node.querySelector(".name-input").value
  );

  var dept=deptCols[index];

  if(dept){

   dept.querySelectorAll(".box.team").forEach(function(team){

    addExcelPair(
     col,
     styles,
     team.querySelector(".team-title .post-input").value,
     team.querySelector(".team-title .name-input").value
    );

    team.querySelectorAll(".person-card").forEach(function(card){

     addExcelPair(
      col,
      styles,
      card.querySelector(".role-input").value,
      card.querySelector(".role-name-input").value
     );

    });

    col.push("");
    styles.push("blank");

   });
  }

  exportColumns.push(col);
  exportStyles.push(styles);

 });

 var maxRows=0;
 exportColumns.forEach(function(col){
  if(col.length>maxRows)maxRows=col.length;
 });

 for(var r=0;r<maxRows;r++){

  var row=[];
  var types=[];

  exportColumns.forEach(function(col,index){
   row.push(col[r] || "");
   types.push(exportStyles[index][r] || "blank");
  });

  pushRow(row,types);
 }

 var ws=XLSX.utils.aoa_to_sheet(aoa);
 var range=XLSX.utils.decode_range(ws["!ref"]);

 for(var R=range.s.r;R<=range.e.r;R++){
  for(var C=range.s.c;C<=range.e.c;C++){
   var addr=XLSX.utils.encode_cell({r:R,c:C});
   if(!ws[addr])ws[addr]={t:"s",v:""};

   var type=(styleMap[R] && styleMap[R][C]) ? styleMap[R][C] : "blank";

   if(type==="title"){
    ws[addr].s={
     font:{bold:true,color:{rgb:"09235F"},sz:18},
     alignment:{horizontal:"center",vertical:"center"},
     fill:{fgColor:{rgb:"FFFFFF"}}
    };
   }else{
    setCellStyle(ws,addr,type);
   }
  }
 }

 ws["!cols"]=[];
 for(var c=0;c<=range.e.c;c++){
  ws["!cols"].push({wch:28});
 }

 ws["!rows"]=[];
 for(var rr=0;rr<=range.e.r;rr++){
  ws["!rows"].push({hpt:22});
 }
 ws["!rows"][0]={hpt:30};

 if(range.e.c>0){
  ws["!merges"]=[{s:{r:0,c:0},e:{r:0,c:range.e.c}}];
 }

 var wb=XLSX.utils.book_new();
 XLSX.utils.book_append_sheet(wb,ws,"Org Structure");
 XLSX.writeFile(wb,"organizational-structure.xlsx",{cellStyles:true});
}

function downloadPNG(){

 commitActiveEdit();

 if(typeof html2canvas==="undefined"){
  alert("Image library not loaded.");
  return;
 }

 var page=document.getElementById("downloadPage");

 document.body.classList.add("downloading");

 setTimeout(function(){

  html2canvas(page,{
   backgroundColor:"#f8fbff",
   scale:4,
   useCORS:true,
   width:page.scrollWidth,
   height:page.scrollHeight,
   windowWidth:page.scrollWidth,
   windowHeight:page.scrollHeight,
   scrollX:0,
   scrollY:0,
   onclone:function(clonedDoc){

    clonedDoc.body.classList.add("downloading");

    clonedDoc.querySelectorAll("input").forEach(function(input){

     var value=(input.value || input.getAttribute("placeholder") || "").trim();

     var div=clonedDoc.createElement("div");

     div.className=input.className + " png-export-text";
     div.textContent=value;

     if(input.classList.contains("post-input")){
      div.style.color="#123678";
      div.style.fontWeight="850";
      div.style.fontSize=input.closest(".box.main") ? "20px" : "15px";
      div.style.marginBottom="7px";
     }

     if(input.classList.contains("name-input")){
      div.style.color=value==="Enter name here" ? "#a8b2c1" : "#1976ed";
      div.style.fontWeight="750";
      div.style.fontSize=input.closest(".box.main") ? "14px" : "12px";
     }

     if(input.classList.contains("role-input")){
      div.style.color="#173a78";
      div.style.fontWeight="750";
      div.style.fontSize="11px";
     }

     if(input.classList.contains("role-name-input")){
      div.style.color=value==="Enter name" ? "#a8b2c1" : "#1976ed";
      div.style.fontWeight="750";
      div.style.fontSize="11px";
     }

     input.parentNode.replaceChild(div,input);

    });
   }
  }).then(function(canvas){

   var link=document.createElement("a");

   link.download="organizational-structure.png";
   link.href=canvas.toDataURL("image/png");

   document.body.appendChild(link);

   link.click();

   document.body.removeChild(link);

   document.body.classList.remove("downloading");

  }).catch(function(){

   document.body.classList.remove("downloading");

   alert("PNG download failed.");

  });

 },150);
}

renderInitial();
setupExistingInputs();

</script>
